name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Reusable: release.yml's CI gate calls this via `uses:` and needs
  # the workflow_call trigger to be declared explicitly.
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep 'cyrius *= *"' cyrius.cyml 2>/dev/null | head -1 | sed 's/.*"\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/${{ github.event.repository.name }}

      - name: Test
        # v5.6.28: bare `cyrius test` picks up the [build].test entry
        # AND auto-discovers tests/*.tcyr — avoids the previous
        # `cyrius test src/test.cyr` form that hard-failed when the
        # stub didn't exist (Issue 1) and also wouldn't ever exercise
        # tests/${proj}.tcyr.
        run: cyrius test

      - name: Golden output (determinism)
        # The M2 -s flag is the deterministic-output hook; this
        # script diffs committed byte sequences against fresh
        # runs to catch regressions in the filter loop, HSV
        # geometry, or darshana's escape format. To accept a
        # deliberate change, regenerate the fixtures locally and
        # document the visual delta in CHANGELOG.md.
        run: sh scripts/golden-check.sh

      - name: Version consistency
        # Asserts VERSION matches every place the version literal
        # lives. Drift detection per the cyim 1.2.2 lesson — without
        # this gate, `anuenue --version` can ship stale data even
        # with a green build + green tests. To fix a drift report,
        # run `sh scripts/version-bump.sh "$(cat VERSION)"`.
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          # CHANGELOG must have a section for this version (release
          # cuts move work out of [Unreleased] into [X.Y.Z]; a fresh
          # cycle-open in [Unreleased] is fine — we only block when
          # VERSION is bumped without a matching CHANGELOG section).
          grep -qE "^## \[${VERSION}\]" CHANGELOG.md \
            || { echo "FAIL: CHANGELOG.md missing section [${VERSION}]"; exit 1; }
          # cyrius.cyml pulls from VERSION via ${file:VERSION} — confirm
          # the indirection hasn't drifted to a hardcoded value.
          grep -qE '^version *= *"\$\{file:VERSION\}"' cyrius.cyml \
            || { echo "FAIL: cyrius.cyml version no longer pulls from VERSION"; exit 1; }
          # The `anuenue X.Y.Z` literal lives in src/version_str.cyr
          # (auto-generated by scripts/version-bump.sh per the cyim
          # pattern). print_version() in src/main.cyr reads the var
          # rather than embedding the string, so this is the surface
          # that drifts.
          grep -qE "_VERSION_STR_ANUENUE *= *\"anuenue ${VERSION}\\\\n\"" src/version_str.cyr \
            || { echo "FAIL: src/version_str.cyr != $VERSION (run: sh scripts/version-bump.sh \"\$(cat VERSION)\")"; exit 1; }
          echo "Version consistent: VERSION = CHANGELOG = cyrius.cyml = version_str.cyr = $VERSION"
